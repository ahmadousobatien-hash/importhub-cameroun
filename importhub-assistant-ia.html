<!DOCTYPE html>
<html>
<head>
    <title>Assistant IA - ImportHub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #0B1F3A; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; }
        .header { background: #0B1F3A; color: white; padding: 20px; text-align: center; }
        .chat { height: 400px; overflow-y: auto; padding: 16px; background: #F4F6FA; }
        .msg { margin-bottom: 12px; display: flex; }
        .user { justify-content: flex-end; }
        .bot { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14px; }
        .user .bubble { background: #F5640A; color: white; }
        .bot .bubble { background: white; border: 1px solid #ddd; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #F5640A; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-left: 8px; cursor: pointer; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; background: white; }
        .sugg { background: #F4F6FA; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .back { text-align: center; padding: 12px; }
        .back a { color: #F5640A; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Assistant IA</h1>
            <p>✅ En ligne</p>
        </div>

        <div class="chat" id="chat">
            <div class="msg bot">
                <div class="bubble">Bonjour ! Posez-moi vos questions sur l'import, les fournisseurs, la douane ou les marges.</div>
            </div>
        </div>

        <div class="suggestions">
            <div class="sugg" onclick="ask('Comment trouver un fournisseur en Chine ?')">🔍 Fournisseur</div>
            <div class="sugg" onclick="ask('Calculer ma marge')">🧮 Marge</div>
            <div class="sugg" onclick="ask('Documents pour la douane Cameroun')">🛃 Douane</div>
            <div class="sugg" onclick="ask('Transport Chine vers Douala')">🚢 Transport</div>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Posez votre question..." onkeypress="if(event.key=='Enter') send()">
            <button onclick="send()">Envoyer</button>
        </div>

        <div class="back">
            <a href="importhub-dashboard.html">← Retour au Dashboard</a>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function getResponse(q) {
            if (q.includes('fournisseur')) return "🔍 Pour trouver un fournisseur : Utilisez Alibaba, filtrez 'Gold Supplier', demandez des échantillons, et utilisez Trade Assurance.";
            if (q.includes('marge')) return "💰 Marge recommandée : 30-60%. Formule : (Prix vente - Coût) / Prix vente × 100.";
            if (q.includes('douane')) return "🛃 Documents : Facture, connaissement, liste colisage, certificat origine. Taxes : 5-30% + TVA 19,25%.";
            if (q.includes('transport')) return "🚢 Maritime : 30-45 jours, 15 000-25 000 FCFA/CBM. Aérien : 5-10 jours, 3 500-6 000 FCFA/kg.";
            return "Je peux vous aider sur : fournisseurs 🔍, marges 💰, douane 🛃, transport 🚢. Posez votre question !";
        }

        function send() {
            const q = input.value.trim();
            if (!q) return;
            addMessage(q, true);
            input.value = '';
            setTimeout(() => {
                addMessage(getResponse(q.toLowerCase()), false);
            }, 500);
        }

        function ask(q) {
            input.value = q;
            send();
        }
    </script>
</body>
              </html>
